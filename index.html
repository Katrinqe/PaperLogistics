<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paperlogistics</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <!-- Externe Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Externe Bibliothek für den Kamera-Scanner -->
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="logo.png" alt="Paperlogistics Logo">
    </div>

    <!-- Main App Content -->
    <main id="app-content" class="hidden">
        
        <!-- === SCREEN 1: HOME === -->
        <div id="home-screen" class="screen">
            <header>
           
            <div class="header-info">
                <span id="greeting">Good morning</span>
            <div class="analog-clock">
                    <div class="dial"></div>
                    <div class="hand hour" id="hour-hand"></div>
                    <div class="hand minute" id="minute-hand"></div>
                    <div class="hand second" id="second-hand"></div>
                    <div class="center-dot"></div>
                </div>
            </div>
        </header>

   <!-- Middle Layout (Calendar & Graph) -->
        <div class="middle-layout">
            <!-- Calendar -->
            <section class="calendar-container">
                <div class="calendar-header" id="calendar-month-year"></div>
                <div class="calendar-weekdays">
                    <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                </div>
                <div class="calendar-grid" id="calendar-days">
                    <!-- JS füllt die Tage ein -->
                </div>
            </section>

            <!-- Dashboard / Graph -->
            <section class="dashboard">
                <div class="graph-area">
                    <div class="inline-toggles" id="graph-toggles">
                        <div class="toggle-slider" id="toggle-slider"></div>
                        <button class="active" onclick="moveSlider(0, this)">Day</button>
                        <button onclick="moveSlider(1, this)">Week</button>
                        <button onclick="moveSlider(2, this)">Month</button>
                    </div>
                    <p class="no-data-text">No data</p>
                </div>
            </section>
        </div>

        <!-- Action Grid (Icons only) -->
        <nav class="action-grid">
           <button aria-label="Neuen QR erstellen" class="icon-btn" id="btn-new-qr">
                <i class="fa-solid fa-qrcode"></i><span class="badge">+</span>
            </button>
 <button aria-label="Scan" class="icon-btn" id="btn-scan-qr">
                <i class="fa-solid fa-expand"></i>
            </button>
           <button aria-label="Listen" class="icon-btn" id="btn-list">
                <i class="fa-solid fa-list"></i>
            </button>
            <button aria-label="Neues Geschäft" class="icon-btn">
                <i class="fa-solid fa-building"></i><span class="badge">+</span>
            </button>
            <button aria-label="Historie" class="icon-btn">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </button>
            <button aria-label="Log Out" class="icon-btn logout">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </nav> <!-- HIER BLEIBT DEIN KOMPLETTER BISHERIGER CODE (Header, Middle-Layout, Action-Grid) -->
        </div>

 <!-- === SCREEN 2: NEW CONTAINER (V2) === -->
        <div id="new-container-screen" class="screen hidden">
            <!-- Dynamischer Header -->
            <div class="dynamic-header">
                <h2 id="current-view-title">CONTAINER</h2>
            </div>
            
            <!-- Editor Sektion (Eingaben) -->
       <!-- Editor Sektion (Eingaben) -->
            <div class="editor-section">
                <input type="text" id="v2-name" value="Container_001">
                
                <div class="setting-group">
                    <label>Format</label>
                    <div class="toggle-row" id="v2-format">
                        <button data-val="A5">A5</button>
                        <button data-val="A6">A6</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Blocks</label>
                    <div class="blocks-grid" id="v2-blocks">
                        <button data-val="1">1</button><button data-val="2">2</button>
                        <button data-val="3">3</button><button data-val="4">4</button>
                        <button data-val="5">5</button><button data-val="6">6</button>
                        <button data-val="7">7</button><button data-val="8">8</button>
                        <button data-val="9">9</button><button data-val="10">10</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Price</label>
                    <div class="toggle-row" id="v2-price">
                        <button data-val="Typ A">Typ A</button>
                        <button data-val="Typ B">Typ B</button>
                        <button data-val="Typ C">Typ C</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Quality</label>
                    <div class="toggle-row" id="v2-quality">
                        <button data-val="High">High</button>
                        <button data-val="Mid">Mid</button>
                        <button data-val="Low">Low</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Date</label>
                    <input type="date" id="v2-date">
                </div>
            </div>

            <!-- Live Card Slider (Swipe Bereich) -->
            <div class="live-card-slider" id="card-slider">
                <!-- JS generiert hier die Container-Card und die Block-Cards -->
            </div>

            <div class="bottom-actions">
                <button class="btn-back" onclick="closeNewContainerScreen()">Back</button>
                <button class="btn-create" id="btn-confirm-v2">Confirm</button>
            </div>
        </div>

        <!-- === SCREEN 3: LIST === -->
        <div id="list-screen" class="screen hidden">
            <div class="list-header">
                <button class="back-arrow" onclick="closeListScreen()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="list-slider">
                    <button class="active">QR Codes</button>
                    <button>Shops</button>
                </div>
                <!-- Unsichtbarer Platzhalter, damit der Slider perfekt mittig ist (Flexbox-Trick) -->
                <div style="width: 30px;"></div> 
            </div>
            
            <div class="list-content" id="qr-list-content">
                <!-- JS generiert hier die gespeicherten QR-Codes -->
            </div>
        </div>

        <!-- === SCREEN 4: DETAIL === -->
        <div id="detail-screen" class="screen hidden">
            <div class="detail-header">
                <button class="back-arrow" onclick="closeDetailScreen()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h2 id="detail-title">DETAILS</h2>
                <div style="width: 30px;"></div> <!-- Unsichtbarer Platzhalter für perfekte Flex-Zentrierung -->
            </div>
            
            <!-- Die 1:1 Card wird hier injiziert -->
            <div id="detail-card-container">
            </div>

            <!-- Historie -->
            <div class="history-section">
                <h3 class="history-title">History</h3>
                <div class="history-list" id="detail-history-list">
                    <!-- JS generiert hier die Historien-Einträge -->
                </div>
            </div>

            <!-- Action Bar (Platzhalter-Funktionen) -->
           <!-- Action Bar -->
            <div class="detail-actions">
                <button class="action-btn" id="btn-edit-container" aria-label="Bearbeiten"><i class="fa-solid fa-pen"></i></button>
                <button class="action-btn" aria-label="Umlagern"><i class="fa-solid fa-right-left"></i></button>
                <button class="action-btn" aria-label="Verkaufen"><i class="fa-solid fa-cart-shopping"></i></button>
                <button class="action-btn btn-danger" id="btn-delete-container" aria-label="Löschen"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>

        <!-- === MODAL (Pop-Up) === -->
        <div id="data-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-title">Define Paper</h3>
                
                <label>Type:</label>
                <select id="modal-type">
                    <option value="A">Type A</option>
                    <option value="B">Type B</option>
                    <option value="C">Type C</option>
                </select>
                
                <label>Date:</label>
                <input type="date" id="modal-date">
                
                <label>Price:</label>
                <select id="modal-price">
                    <option value="Type 1">Type 1</option>
                    <option value="Type 2">Type 2</option>
                    <option value="Type 3">Type 3</option>
                </select>
                
                <label>Quality:</label>
                <select id="modal-quality">
                    <option value="Good">Good</option>
                    <option value="Normal">Normal</option>
                    <option value="Cheap">Cheap</option>
                </select>
                
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button class="btn-confirm" onclick="confirmModal()">Confirm</button>
                </div>
            </div>
        </div>

      <!-- === SCREEN 5: SCANNER (ZXing Engine) === -->
        <div id="scan-screen" class="screen hidden">
            <div class="scan-header">
                <button class="back-arrow" onclick="closeScanScreen()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h2>SCANNER</h2>
                <div style="width: 30px;"></div>
            </div>
            
            <div class="scanner-container">
                <video id="video-preview"></video>
                <!-- Unser eigenes, unzerstörbares CSS-Overlay -->
                <div class="scan-overlay">
                    <div class="scan-box"></div>
                </div>
            </div>
            
            <p style="text-align: center; color: #888; font-size: 0.9rem; margin-top: 20px;">
                Fokussiere einen Container- oder Block-QR-Code
            </p>
        </div>
<!-- === DELETE CONFIRMATION POPUP === -->
<!-- === DELETE CONFIRMATION POPUP === -->
        <div id="delete-popup" class="hidden">
            <div class="popup-content">
                <h3 class="popup-title">You sure you wanna delete?</h3>
                <div class="popup-actions">
                    <button id="btn-popup-no" class="btn-popup-no">No</button>
                    <button id="btn-popup-yes" class="btn-popup-yes">Yes</button>
                </div>
            </div>
        </div>
    </main>
<!-- Externe Bibliothek für QR-Codes -->
    <!-- Externe Bibliothek für Premium QR-Codes (qr-code-styling) -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="script.js"></script>
</body>
</html>
