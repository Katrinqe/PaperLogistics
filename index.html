<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paperlogistics</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <!-- Externe Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="logo.png" alt="Paperlogistics Logo">
    </div>

    <!-- Main App Content -->
    <main id="app-content" class="hidden">
        
        <!-- === SCREEN 1: HOME === -->
        <div id="home-screen" class="screen">
            <header>
           
            <div class="header-info">
                <span id="greeting">Good morning</span>
            <div class="analog-clock">
                    <div class="dial"></div>
                    <div class="hand hour" id="hour-hand"></div>
                    <div class="hand minute" id="minute-hand"></div>
                    <div class="hand second" id="second-hand"></div>
                    <div class="center-dot"></div>
                </div>
            </div>
        </header>

   <!-- Middle Layout (Calendar & Graph) -->
        <div class="middle-layout">
            <!-- Calendar -->
            <section class="calendar-container">
                <div class="calendar-header" id="calendar-month-year"></div>
                <div class="calendar-weekdays">
                    <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                </div>
                <div class="calendar-grid" id="calendar-days">
                    <!-- JS füllt die Tage ein -->
                </div>
            </section>

            <!-- Dashboard / Graph -->
            <section class="dashboard">
                <div class="graph-area">
                    <div class="inline-toggles" id="graph-toggles">
                        <div class="toggle-slider" id="toggle-slider"></div>
                        <button class="active" onclick="moveSlider(0, this)">Day</button>
                        <button onclick="moveSlider(1, this)">Week</button>
                        <button onclick="moveSlider(2, this)">Month</button>
                    </div>
                    <p class="no-data-text">No data</p>
                </div>
            </section>
        </div>

        <!-- Action Grid (Icons only) -->
        <nav class="action-grid">
           <button aria-label="Neuen QR erstellen" class="icon-btn" id="btn-new-qr">
                <i class="fa-solid fa-qrcode"></i><span class="badge">+</span>
            </button>
            <button aria-label="Scannen" class="icon-btn">
                <i class="fa-solid fa-expand"></i>
            </button>
           <button aria-label="Listen" class="icon-btn" id="btn-list">
                <i class="fa-solid fa-list"></i>
            </button>
            <button aria-label="Neues Geschäft" class="icon-btn">
                <i class="fa-solid fa-building"></i><span class="badge">+</span>
            </button>
            <button aria-label="Historie" class="icon-btn">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </button>
            <button aria-label="Log Out" class="icon-btn logout">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </nav> <!-- HIER BLEIBT DEIN KOMPLETTER BISHERIGER CODE (Header, Middle-Layout, Action-Grid) -->
        </div>

 <!-- === SCREEN 2: NEW CONTAINER (V2) === -->
        <div id="new-container-screen" class="screen hidden">
            <!-- Dynamischer Header -->
            <div class="dynamic-header">
                <h2 id="current-view-title">CONTAINER</h2>
            </div>
            
            <!-- Editor Sektion (Eingaben) -->
            <div class="editor-section">
                <input type="text" id="v2-name" value="Container_001">
                
                <div class="setting-group">
                    <label>QR Design</label>
                    <div class="toggle-row" id="v2-qr-design">
                        <button class="active" data-val="squares"><i class="fa-solid fa-qrcode"></i></button>
                        <button data-val="dots"><i class="fa-solid fa-braille"></i></button>
                        <button data-val="rounded"><i class="fa-solid fa-border-all"></i></button>
                        <button data-val="mixed"><i class="fa-solid fa-barcode"></i></button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Format</label>
                    <div class="toggle-row" id="v2-format">
                        <button data-val="A5">A5</button>
                        <button data-val="A6">A6</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Blocks</label>
                    <div class="blocks-grid" id="v2-blocks">
                        <button data-val="1">1</button><button data-val="2">2</button>
                        <button data-val="3">3</button><button data-val="4">4</button>
                        <button data-val="5">5</button><button data-val="6">6</button>
                        <button data-val="7">7</button><button data-val="8">8</button>
                        <button data-val="9">9</button><button data-val="10">10</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Quality</label>
                    <div class="toggle-row" id="v2-quality">
                        <button data-val="High">High</button>
                        <button data-val="Mid">Mid</button>
                        <button data-val="Low">Low</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Date</label>
                    <input type="date" id="v2-date">
                </div>
            </div>

            <!-- Live Card Slider (Swipe Bereich) -->
            <div class="live-card-slider" id="card-slider">
                <!-- JS generiert hier die Container-Card und die Block-Cards -->
            </div>

            <div class="bottom-actions">
                <button class="btn-back" onclick="closeNewContainerScreen()">Back</button>
                <button class="btn-create" id="btn-confirm-v2">Confirm</button>
            </div>
        </div>

        <!-- === SCREEN 3: LIST === -->
        <div id="list-screen" class="screen hidden">
            <div class="list-header">
                <button class="back-arrow" onclick="closeListScreen()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="list-slider">
                    <button class="active">QR Codes</button>
                    <button>Shops</button>
                </div>
                <!-- Unsichtbarer Platzhalter, damit der Slider perfekt mittig ist (Flexbox-Trick) -->
                <div style="width: 30px;"></div> 
            </div>
            
            <div class="list-content" id="qr-list-content">
                <!-- JS generiert hier die gespeicherten QR-Codes -->
            </div>
        </div>

        <!-- === MODAL (Pop-Up) === -->
        <div id="data-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-title">Define Paper</h3>
                
                <label>Type:</label>
                <select id="modal-type">
                    <option value="A">Type A</option>
                    <option value="B">Type B</option>
                    <option value="C">Type C</option>
                </select>
                
                <label>Date:</label>
                <input type="date" id="modal-date">
                
                <label>Price:</label>
                <select id="modal-price">
                    <option value="Type 1">Type 1</option>
                    <option value="Type 2">Type 2</option>
                    <option value="Type 3">Type 3</option>
                </select>
                
                <label>Quality:</label>
                <select id="modal-quality">
                    <option value="Good">Good</option>
                    <option value="Normal">Normal</option>
                    <option value="Cheap">Cheap</option>
                </select>
                
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button class="btn-confirm" onclick="confirmModal()">Confirm</button>
                </div>
            </div>
        </div>

    </main>
<!-- Externe Bibliothek für QR-Codes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
